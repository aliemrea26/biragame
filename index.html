<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bira Oyunu</title>
  <style>
    :root {
      --cream: #fff6db;
      --amber: #f4b73f;
      --amber-deep: #cb7a18;
      --lager: #ffe17a;
      --foam: #fffef9;
      --brown: #482511;
      --brown-soft: rgba(72, 37, 17, 0.75);
      --green: #2fbb63;
      --red: #f04d4d;
      --card: rgba(255, 248, 220, 0.76);
      --shadow: rgba(91, 45, 12, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--brown);
      background:
        radial-gradient(circle at top, rgba(255, 250, 234, 0.92), transparent 32%),
        linear-gradient(180deg, #ffefbd 0%, #ffc45a 42%, #ee8c24 100%);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .foam {
      position: absolute;
      inset: -8vh -10vw auto;
      height: 22vh;
      background:
        radial-gradient(circle at 6% 85%, var(--foam) 0 5vw, transparent 5.2vw),
        radial-gradient(circle at 16% 70%, var(--foam) 0 7vw, transparent 7.2vw),
        radial-gradient(circle at 31% 88%, var(--foam) 0 6vw, transparent 6.2vw),
        radial-gradient(circle at 48% 72%, var(--foam) 0 8vw, transparent 8.2vw),
        radial-gradient(circle at 67% 88%, var(--foam) 0 7vw, transparent 7.2vw),
        radial-gradient(circle at 84% 68%, var(--foam) 0 8vw, transparent 8.2vw),
        radial-gradient(circle at 98% 86%, var(--foam) 0 6vw, transparent 6.2vw);
      opacity: 0.95;
      pointer-events: none;
      z-index: 0;
    }

    .bubbles,
    .stickers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bubble,
    .sticker {
      position: absolute;
      animation: drift 8s ease-in-out infinite;
    }

    .bubble {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.26);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .bubble.one { width: 28px; height: 28px; left: 8%; top: 24%; animation-delay: -0.6s; }
    .bubble.two { width: 18px; height: 18px; left: 18%; top: 65%; animation-delay: -2s; }
    .bubble.three { width: 40px; height: 40px; right: 14%; top: 22%; animation-delay: -1.4s; }
    .bubble.four { width: 26px; height: 26px; right: 9%; bottom: 12%; animation-delay: -3.2s; }
    .bubble.five { width: 20px; height: 20px; left: 72%; top: 52%; animation-delay: -4.1s; }

    .sticker {
      font-size: clamp(2.4rem, 5vw, 4rem);
      filter: drop-shadow(0 10px 24px rgba(70, 32, 8, 0.18));
      opacity: 0.9;
    }

    .sticker.s1 { left: 6%; top: 18%; transform: rotate(-12deg); animation-delay: -1.1s; }
    .sticker.s2 { right: 8%; top: 16%; transform: rotate(14deg); animation-delay: -3.5s; }
    .sticker.s3 { left: 10%; bottom: 12%; transform: rotate(-6deg); animation-delay: -2.2s; }
    .sticker.s4 { right: 12%; bottom: 16%; transform: rotate(9deg); animation-delay: -4.4s; }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px 36px;
    }

    .card {
      width: min(94vw, 900px);
      border-radius: 36px;
      padding: clamp(24px, 5vw, 42px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.56), rgba(255, 243, 211, 0.72));
      border: 1px solid rgba(255, 248, 232, 0.68);
      box-shadow:
        0 22px 50px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(18px);
    }

    .headline {
      margin: 0;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(2.7rem, 7vw, 5.9rem);
      line-height: 0.93;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .subline {
      margin: 14px 0 0;
      font-size: clamp(1rem, 2.1vw, 1.28rem);
      line-height: 1.5;
      color: var(--brown-soft);
      max-width: 56ch;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 26px;
      align-items: center;
      margin-bottom: 24px;
    }

    .photo-wall {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .beer-shot {
      position: relative;
      min-height: 150px;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.56);
      background:
        radial-gradient(circle at top, rgba(255, 254, 246, 0.9) 0 18%, transparent 18.1%),
        linear-gradient(180deg, rgba(255, 250, 220, 0.95) 0 18%, rgba(255, 195, 77, 0.96) 18% 100%);
      box-shadow: inset 0 -14px 24px rgba(166, 82, 12, 0.18);
    }

    .beer-shot::before {
      content: "";
      position: absolute;
      inset: 12% 24% 10%;
      border-radius: 20px 20px 28px 28px;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.98) 0 18%, transparent 18.2%),
        linear-gradient(180deg, #fffef6 0 16%, #ffd85d 16% 68%, #e7941f 68% 100%);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.44),
        0 10px 18px rgba(127, 61, 10, 0.14);
    }

    .beer-shot::after {
      content: "";
      position: absolute;
      right: 18%;
      top: 28%;
      width: 18%;
      height: 34%;
      border-radius: 0 20px 20px 0;
      border: 9px solid rgba(255, 249, 230, 0.88);
      border-left: 0;
    }

    .beer-shot span {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(74, 35, 11, 0.14);
      font-size: 0.92rem;
      font-weight: 700;
      color: #5f2c0b;
    }

    .question-wrap {
      position: relative;
      min-height: 300px;
      padding: 20px;
      border-radius: 28px;
      background: rgba(255, 253, 243, 0.52);
      border: 1px dashed rgba(117, 57, 15, 0.18);
      overflow: hidden;
    }

    .prompt {
      margin: 0;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-wrap: balance;
      max-width: 10ch;
    }

    .tagline {
      margin: 12px 0 0;
      color: rgba(72, 37, 17, 0.72);
      font-weight: 700;
    }

    .arena {
      position: relative;
      min-height: 220px;
      margin-top: 24px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 246, 214, 0.52));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26);
    }

    .btn {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 138px;
      min-height: 58px;
      padding: 12px 24px;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #fffef8;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(67, 35, 11, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 26px rgba(67, 35, 11, 0.24);
      outline: none;
    }

    .yes-btn {
      left: 24px;
      bottom: 22px;
      background: linear-gradient(180deg, #3cd472, #248e49);
    }

    .no-btn {
      left: 188px;
      top: 24px;
      background: linear-gradient(180deg, #ff6a6a, #d53e3e);
      transform-origin: center;
    }

    .status {
      margin: 18px 4px 0;
      min-height: 28px;
      font-size: 1rem;
      font-weight: 800;
      color: #763713;
    }

    .panel {
      display: none;
      margin-top: 24px;
      animation: rise 0.35s ease;
    }

    .panel.active {
      display: block;
    }

    .success-box {
      padding: 24px;
      border-radius: 28px;
      background: rgba(255, 249, 228, 0.66);
      border: 1px solid rgba(123, 61, 16, 0.12);
    }

    .success-head {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .check-badge {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: linear-gradient(180deg, #46d978, #2e9f56);
      color: #fff;
      font-size: 1.8rem;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(36, 142, 73, 0.24);
      flex: 0 0 auto;
    }

    .success-box h2,
    .success-box p {
      margin: 0;
    }

    .success-box h2 {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 0.95;
      text-transform: uppercase;
    }

    .success-box p {
      margin-top: 10px;
      line-height: 1.55;
      color: rgba(72, 37, 17, 0.78);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.95rem;
      font-weight: 800;
      color: rgba(72, 37, 17, 0.84);
    }

    .checkline {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.62);
      color: rgba(72, 37, 17, 0.8);
      font-size: 0.94rem;
      line-height: 1.45;
      font-weight: 700;
    }

    .checkline input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    input,
    textarea {
      width: 100%;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(101, 50, 14, 0.16);
      background: rgba(255, 255, 255, 0.8);
      font: inherit;
      color: var(--brown);
      outline: none;
      transition: border-color 0.18s ease, transform 0.18s ease;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(180, 101, 21, 0.8);
      transform: translateY(-1px);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .submit-btn,
    .ghost-btn {
      position: static;
      min-height: 56px;
      min-width: 180px;
    }

    .submit-btn {
      background: linear-gradient(180deg, #6d3fff, #4120c8);
    }

    .ghost-btn {
      background: rgba(80, 39, 13, 0.12);
      color: #6b3411;
      border: 1px solid rgba(80, 39, 13, 0.12);
    }

    .result {
      margin-top: 14px;
      font-size: 0.95rem;
      color: rgba(72, 37, 17, 0.72);
      line-height: 1.5;
    }

    .result {
      min-height: 24px;
      font-weight: 800;
      color: #6b2e0a;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @media (max-width: 820px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .prompt {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 20px;
        border-radius: 28px;
      }

      .photo-wall {
        grid-template-columns: 1fr 1fr;
      }

      .question-wrap {
        min-height: 340px;
        padding: 16px;
      }

      .arena {
        min-height: 250px;
      }

      .btn {
        min-width: 116px;
        min-height: 52px;
        padding: 10px 18px;
        font-size: 0.95rem;
      }

      .yes-btn {
        left: 16px;
        bottom: 16px;
      }

      .no-btn {
        left: 146px;
        top: 18px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="foam"></div>
    <div class="bubbles">
      <div class="bubble one"></div>
      <div class="bubble two"></div>
      <div class="bubble three"></div>
      <div class="bubble four"></div>
      <div class="bubble five"></div>
    </div>
    <div class="stickers" aria-hidden="true">
      <div class="sticker s1">🍺</div>
      <div class="sticker s2">🍻</div>
      <div class="sticker s3">🍺</div>
      <div class="sticker s4">🍻</div>
    </div>

    <main class="layout">
      <section class="card">
        <div class="hero-grid">
          <div>
            <h1 class="headline">Bira i&ccedil;mek istiyor musun?</h1>
          </div>

          <div class="photo-wall" aria-hidden="true">
            <div class="beer-shot"><span>K&ouml;p&uuml;k fazla</span></div>
            <div class="beer-shot"><span>So&#287;uk servis</span></div>
            <div class="beer-shot"><span>Arkada&#351; modu</span></div>
            <div class="beer-shot"><span>&#350;erefe havas&#305;</span></div>
          </div>
        </div>

        <div class="question-wrap">
          <p class="prompt">Bira i&ccedil;mek istiyor musun?</p>
          <div class="arena" id="arena">
            <button class="btn yes-btn" id="yes-btn" type="button">EVET</button>
            <button class="btn no-btn" id="no-btn" type="button">HAYIR</button>
          </div>

          <p class="status" id="status">Hen&uuml;z karar verilmedi.</p>
        </div>

        <section class="panel" id="success-panel">
          <div class="success-box">
            <div class="success-head">
              <div class="check-badge" aria-hidden="true">&#10003;</div>
              <h2>Do&#287;ru se&ccedil;imi yapt&#305;n</h2>
            </div>
            <p id="success-copy">
              Harika. O zaman plan&#305; netle&#351;tirelim; a&#351;a&#287;&#305;ya isim, soyisim, zaman ve konumu b&#305;rak.
            </p>

            <form
              id="beer-form"
              accept-charset="UTF-8"
            >
              <input type="hidden" id="submitted-answer" name="answer" value="Evet">
              <input type="hidden" id="submitted-at" name="submitted_at" value="">

              <div class="form-grid">
                <div class="field">
                  <label for="first-name">&#304;sim</label>
                  <input id="first-name" name="isim" type="text" required placeholder="Ad&#305;n">
                </div>

                <div class="field">
                  <label for="last-name">Soyisim</label>
                  <input id="last-name" name="soyisim" type="text" required placeholder="Soyad&#305;n">
                </div>

                <div class="field">
                  <label for="plan-time">Zaman</label>
                  <input id="plan-time" name="zaman" type="datetime-local" required>
                </div>

                <div class="field">
                  <label for="phone">Telefon (iste&#287;e ba&#287;l&#305;)</label>
                  <input id="phone" name="telefon" type="tel" placeholder="05xx xxx xx xx">
                </div>

                <div class="field full">
                  <label for="location">Konum</label>
                  <textarea id="location" name="konum" required placeholder="Mekan ad&#305;, mahalle veya konum tarifi"></textarea>
                </div>
              </div>

              <div class="actions">
                <button class="btn submit-btn" type="submit">Bilgileri G&ouml;nder</button>
                <button class="btn ghost-btn" id="geo-btn" type="button">Konumu Otomatik Doldur</button>
              </div>

              <label class="checkline">
                <input type="checkbox" name="onay" value="Onaylandi" required>
                Bu bilgilerin plan olu&#351;turmak i&ccedil;in g&ouml;nderilece&#287;ini biliyorum.
              </label>

              <p class="result" id="result"></p>
            </form>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const arena = document.getElementById("arena");
    const yesButton = document.getElementById("yes-btn");
    const noButton = document.getElementById("no-btn");
    const statusText = document.getElementById("status");
    const successPanel = document.getElementById("success-panel");
    const successCopy = document.getElementById("success-copy");
    const beerForm = document.getElementById("beer-form");
    const resultText = document.getElementById("result");
    const geoButton = document.getElementById("geo-btn");
    const locationField = document.getElementById("location");
    const submittedAt = document.getElementById("submitted-at");
    const WHATSAPP_NUMBER = "905394603445";

    const playfulReplies = [
      "Hay&#305;r butonu yine ka&ccedil;t&#305;.",
      "Olmad&#305;, bir daha dene bakal&#305;m.",
      "Hay&#305;r bu oyunda biraz &ccedil;ok nazl&#305;.",
      "Buton seni troll&uuml;yor olabilir.",
      "Bu gidi&#351;le EVET daha mant&#305;kl&#305; duruyor."
    ];

    let dodgeCount = 0;
    let noScale = 1;

    function updateNoButtonPosition() {
      const arenaRect = arena.getBoundingClientRect();
      const buttonRect = noButton.getBoundingClientRect();
      const maxX = Math.max(10, arenaRect.width - buttonRect.width - 10);
      const maxY = Math.max(10, arenaRect.height - buttonRect.height - 10);
      const nextX = Math.random() * maxX;
      const nextY = Math.random() * maxY;

      noButton.style.left = nextX + "px";
      noButton.style.top = nextY + "px";
    }

    function dodgeNoButton() {
      dodgeCount += 1;
      noScale = Math.max(0.18, noScale * 0.82);

      noButton.style.transform = "scale(" + noScale + ") rotate(" + ((Math.random() * 18) - 9) + "deg)";
      noButton.style.opacity = String(Math.max(0.34, noScale + 0.1));
      updateNoButtonPosition();

      statusText.innerHTML = playfulReplies[dodgeCount % playfulReplies.length];
      yesButton.style.transform = "translateY(-3px) scale(" + (1 + (dodgeCount * 0.03)) + ")";
      yesButton.style.boxShadow = "0 20px 32px rgba(36, 142, 73, 0.28)";
    }

    function chooseYes() {
      statusText.innerHTML = "Tamam, do&#287;ru cevap bulundu.";
      successCopy.innerHTML = "Do&#287;ru se&ccedil;imi yapt&#305;n. &#350;imdi isim, soyisim, zaman ve konumu yaz; g&ouml;nderince plan olu&#351;sun.";
      successPanel.classList.add("active");
      yesButton.disabled = true;
      noButton.disabled = true;
      yesButton.style.opacity = "0.6";
      noButton.style.opacity = "0.2";
      submittedAt.value = new Date().toISOString();
      document.getElementById("first-name").focus();
      successPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function submitForm(event) {
      event.preventDefault();
      resultText.innerHTML = "WhatsApp haz&#305;rlan&#305;yor...";
      submittedAt.value = new Date().toISOString();
      const formData = new FormData(beerForm);
      const message = [
        "Bira Oyunu formu geldi:",
        "",
        "Isim: " + (formData.get("isim") || ""),
        "Soyisim: " + (formData.get("soyisim") || ""),
        "Zaman: " + (formData.get("zaman") || ""),
        "Telefon: " + (formData.get("telefon") || ""),
        "Konum: " + (formData.get("konum") || ""),
        "Onay: " + (formData.get("onay") || ""),
        "Cevap: " + (formData.get("answer") || ""),
        "Gonderim zamani: " + (formData.get("submitted_at") || "")
      ].join("\n");

      const whatsappUrl = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(message);
      window.open(whatsappUrl, "_blank", "noopener");
      resultText.innerHTML = "WhatsApp penceresi a&ccedil;&#305;ld&#305;.";
    }

    function fillWithGeolocation() {
      if (!("geolocation" in navigator)) {
        resultText.innerHTML = "Bu cihaz konumu otomatik veremiyor; alan&#305; elle doldurabilirsin.";
        return;
      }

      geoButton.disabled = true;
      geoButton.textContent = "Al&#305;n&#305;yor...";

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude.toFixed(6);
          const lon = position.coords.longitude.toFixed(6);
          locationField.value = "Yakla&#351;&#305;k konum: " + lat + ", " + lon;
          geoButton.disabled = false;
          geoButton.textContent = "Konumu Otomatik Doldur";
          resultText.innerHTML = "Konum alan&#305; otomatik dolduruldu.";
        },
        () => {
          geoButton.disabled = false;
          geoButton.textContent = "Konumu Otomatik Doldur";
          resultText.innerHTML = "Konum izni verilmedi; elle yazabilirsin.";
        },
        {
          enableHighAccuracy: true,
          timeout: 10000
        }
      );
    }

    noButton.addEventListener("click", dodgeNoButton);
    noButton.addEventListener("mouseenter", dodgeNoButton);
    yesButton.addEventListener("click", chooseYes);
    beerForm.addEventListener("submit", submitForm);
    geoButton.addEventListener("click", fillWithGeolocation);
  </script>
</body>
</html>
